version: '3.8'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — Airflow metadata database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - de_network

  # ─────────────────────────────────────────────
  # ScyllaDB — Target analytics database
  # ─────────────────────────────────────────────
  scylladb:
    image: scylladb/scylla:5.4
    container_name: scylladb
    command: --smp 1 --memory 512M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9042:9042"   # CQL port
      - "9180:9180"   # Prometheus metrics
    volumes:
      - scylla_data:/var/lib/scylla
      - ./scripts/init_scylla.cql:/init_scylla.cql
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - de_network

  # ─────────────────────────────────────────────
  # Spark Master
  # ─────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3-python3
    container_name: spark_master
    user: root
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: >
      bash -c "/opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080"
    ports:
      - "8080:8080"               # Spark Web UI
      - "7077:7077"               # Spark master port
    volumes:
      - ./scripts:/opt/scripts
      - ./data:/opt/data
      - ./jars:/opt/spark/jars/extra
    networks:
      - de_network
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Spark Worker
  # ─────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.3-python3
    container_name: spark_worker
    user: root
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: >
      bash -c "/opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081"
    ports:
      - "8081:8081"               # Worker Web UI
    volumes:
      - ./scripts:/opt/scripts
      - ./data:/opt/data
      - ./jars:/opt/spark/jars/extra
    networks:
      - de_network
    depends_on:
      - spark-master

  # ─────────────────────────────────────────────
  # Airflow — Init DB + create admin user
  # ─────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_ROLE: Admin
    entrypoint: /bin/bash
    command: -c "exec /entrypoint airflow version"
    networks:
      - de_network
    restart: no

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow_webserver
    command: webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    user: root
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/delta-lake:/opt/airflow/delta-lake
      - ./spark_jobs:/opt/airflow/spark_jobs
      - /var/run/docker.sock:/var/run/docker.sock  
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - de_network

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow_scheduler
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    user: root
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/delta-lake:/opt/airflow/delta-lake
      - ./spark_jobs:/opt/airflow/spark_jobs
      - /var/run/docker.sock:/var/run/docker.sock  
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - de_network
volumes:
  postgres_data:
  scylla_data:

networks:
  de_network:
    driver: bridge